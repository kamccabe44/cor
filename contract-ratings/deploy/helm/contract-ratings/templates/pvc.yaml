{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "contract-ratings.fullname" . }}-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "contract-ratings.labels" . | nindent 4 }}
  annotations:
    # Keep the tenant's data if the release is ever `helm uninstall`-ed by
    # accident; deleting the PVC is a deliberate, separate step.
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
