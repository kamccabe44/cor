apiVersion: v1
kind: Service
metadata:
  name: contract-ratings
  labels:
    app: contract-ratings
spec:
  # ClusterIP in the base; the docker-desktop overlay switches this to
  # LoadBalancer (Docker Desktop maps those onto localhost) and the cloud
  # overlay fronts it with an Ingress.
  type: ClusterIP
  selector:
    app: contract-ratings
  ports:
    - name: http
      port: 80
      targetPort: 8080
