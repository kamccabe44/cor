apiVersion: v1
kind: Secret
metadata:
  name: {{ include "contract-ratings.authSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "contract-ratings.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.auth.appPassword }}
  {{- fail "auth.appPassword is required — the provisioner must set a per-tenant password" }}
  {{- end }}
  APP_PASSWORD: {{ .Values.auth.appPassword | quote }}
  {{- with .Values.auth.sessionSecret }}
  APP_SESSION_SECRET: {{ . | quote }}
  {{- end }}
