apiVersion: v1
kind: Secret
metadata:
  name: contract-ratings
type: Opaque
stringData:
  # CHANGE THIS before applying. This one shared password gates the whole
  # app. Prefer creating the secret out-of-band instead of committing a
  # real value, e.g.:
  #   kubectl create secret generic contract-ratings \
  #     --from-literal=APP_PASSWORD='your-strong-password'
  APP_PASSWORD: "change-me-please"
  # Optional: a fixed session-signing secret. If omitted the server
  # derives one from the password (fine for a single replica). Set it if
  # you ever run more than one replica so cookies validate across pods.
  # APP_SESSION_SECRET: "some-long-random-string"
