apiVersion: v1
kind: Service
metadata:
  name: contract-ratings
  labels:
    app: contract-ratings
spec:
  # Docker Desktop maps LoadBalancer services onto localhost, so this
  # makes the app reachable at http://localhost/ once it's running. Switch
  # to NodePort (or use `kubectl port-forward`) on clusters without a
  # LoadBalancer.
  type: LoadBalancer
  selector:
    app: contract-ratings
  ports:
    - name: http
      port: 80
      targetPort: 8080
