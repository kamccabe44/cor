# Build the Contract Ratings container image in CI and push it to GitHub
# Container Registry (ghcr.io/<owner>/contract-ratings):
#   :latest / :<sha>   — the self-contained image (SPA + API, node:sqlite)
# Mirrors the os_alerts repo's image-build workflow (COR has no offline
# variant — the image is already offline-capable). Run from the Actions tab,
# or it runs automatically when app code changes on main. Pull with:
#   docker pull ghcr.io/<owner>/contract-ratings:latest
# Publishing to ECR for the PEACEMAKER per-tenant add-on stays with
# contract-ratings/scripts/publish-ecr.sh (needs AWS credentials).
name: Image build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "contract-ratings/api/**"
      - "contract-ratings/server/**"
      - "contract-ratings/frontend/**"
      - "contract-ratings/docker/**"
      - ".github/workflows/image-build.yml"

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/contract-ratings
          docker build -f contract-ratings/docker/Dockerfile \
            -t "$IMAGE:latest" -t "$IMAGE:${GITHUB_SHA::7}" contract-ratings
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${GITHUB_SHA::7}"
