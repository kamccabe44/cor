image:
  repository: 385357908943.dkr.ecr.us-east-1.amazonaws.com/cor
  tag: latest
  pullPolicy: Always

# Shared login password for the app (see AUTH_PASSWORD in the app
# README). Do not commit a real value here — pass at install/upgrade
# time with --set-string auth.password=..., e.g. from an SSM parameter
# or a gitignored values file. The chart deliberately fails to render
# without it, since an empty AUTH_PASSWORD silently disables the login
# gate rather than failing safe.
auth:
  password: ""

service:
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: traefik
  host: cor.1136mpco.com

persistence:
  storageClassName: local-path
  size: 1Gi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  path: /api/health
  readinessInitialDelaySeconds: 5
  readinessPeriodSeconds: 10
  livenessInitialDelaySeconds: 10
  livenessPeriodSeconds: 20

podSecurityContext:
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
