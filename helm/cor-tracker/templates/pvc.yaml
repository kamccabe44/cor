apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cor-data
  labels:
    {{- include "cor-tracker.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
