apiVersion: v1
kind: Service
metadata:
  name: cor-tracker
  labels:
    {{- include "cor-tracker.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "cor-tracker.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  type: ClusterIP
